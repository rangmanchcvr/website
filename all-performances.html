<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-N1XXHFMZM3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-N1XXHFMZM3');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performances — RANGMANCH</title>
  <meta name="description"
    content="Explore all performances by RANGMANCH, the official Theatre Club of CVR College of Engineering. Street plays, stage plays, mimes and more.">
  <meta name="theme-color" content="#0a0806">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" rel="stylesheet">

  <link rel="stylesheet" href="styles.css?v=1128">

  <!-- Vercel Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>

<body style="cursor: default;">

  <!-- CURTAIN INTRO -->
  <div class="curtain-intro" id="curtainIntro" aria-hidden="true">
    <div class="curtain-panel curtain-left"></div>
    <div class="curtain-panel curtain-right"></div>
    <div class="curtain-mark">
      <span class="curtain-mark-line">रंगमंच</span>
      <span class="curtain-mark-sub">raising the curtain&hellip;</span>
    </div>
  </div>

  <div class="carousel-page">

    <!-- Header -->
    <header class="site-header" id="siteHeader" style="position: absolute; top: 0; left: 0; width: 100%; z-index: 1000; background: transparent;">
      <div class="header-inner">
        <a href="index.html#hero" class="brand">
          <div class="brand-mark" style="overflow: hidden; padding: 0;">
            <img src="logo.png" alt="Rangmanch Logo"
              style="width: 100%; height: 100%; object-fit: cover; transform: scale(1.25) translateY(-2px);">
          </div>
          <span class="brand-word">RANGMANCH</span>
        </a>
        <nav class="main-nav" id="mainNav">
          <a href="index.html#about" data-act="I">About</a>
          <a href="index.html#productions" data-act="II">Performances</a>
          <a href="index.html#awards" data-act="III">Awards</a>
          <a href="index.html#mentor" data-act="IV">Mentor</a>
          <a href="index.html#team" data-act="V">Company</a>
          <a href="index.html#gallery" data-act="VI">Gallery</a>
          <a href="index.html#" class="nav-cta join-trigger">Join Us</a>
        </nav>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>

    <!-- Title -->
    <h1 class="carousel-page-title">Our Performances</h1>

    <!-- Carousel -->
    <div class="carousel-region" role="region" aria-label="Performance showcase">

      <!-- Accessible live announcer -->
      <div class="carousel-live" aria-live="polite" aria-atomic="true"></div>

      <!-- Prev arrow -->
      <button class="carousel-arrow carousel-prev" aria-label="Previous performance">
        <i class="ri-arrow-left-s-line"></i>
      </button>

      <!-- Viewport -->
      <div class="carousel-viewport">
        <div class="carousel-track" id="carouselTrack">
          <!-- Cards rendered by JS -->
        </div>
      </div>

      <!-- Next arrow -->
      <button class="carousel-arrow carousel-next" aria-label="Next performance">
        <i class="ri-arrow-right-s-line"></i>
      </button>

      <!-- Dots -->
      <div class="carousel-dots" id="carouselDots" role="tablist" aria-label="Performance selector"></div>
    </div>

  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const curtain = document.getElementById('curtainIntro');
      if (curtain && window.gsap) {
        const tlIntro = gsap.timeline({ delay: .2 });
        tlIntro
          .to('.curtain-mark', { opacity: 1, duration: .5 })
          .to('.curtain-mark', { opacity: 0, duration: .4, delay: .6 })
          .to('.curtain-left', { xPercent: -100, duration: 1.1, ease: 'power3.inOut' }, '-=.1')
          .to('.curtain-right', { xPercent: 100, duration: 1.1, ease: 'power3.inOut' }, '<')
          .set(curtain, { display: 'none' });
      }
    });
  </script>
  <script src="performances-data.js"></script>
  <script src="performances-carousel.js?v=6"></script>

  <script>
    const navToggle = document.getElementById('navToggle');
    const mainNav = document.getElementById('mainNav');
    if (navToggle && mainNav) {
      navToggle.addEventListener('click', () => {
        const isOpen = mainNav.classList.toggle('open');
        navToggle.setAttribute('aria-expanded', isOpen);
      });
      mainNav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
        mainNav.classList.remove('open');
        navToggle.setAttribute('aria-expanded', 'false');
      }));
    }
  </script>
</body>

</html>
